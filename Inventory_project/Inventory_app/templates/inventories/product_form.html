{% extends "inventories/layout.html" %}

{% block title %} Inventory App {% endblock %}

{% block content %}

<div class="mt-6">
   <h1 class="text-3xl font-semibold text-center text-gray-800"> Product Form </h1>
</div>

<div class="mx-auto p-8 mt-6 max-w-3xl border-2 shadow-xl rounded-2xl bg-white">
   <form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-0">{{ field.label }}</label>
        {{ field}}
        
        {% if field.errors %}
            <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
        {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="text-center text-white font-semibold bg-green-600 hover:bg-green-700 ease-in duration-200 rounded-md py-2 w-full " >Save Product</button>

   </form>
</div>
   
{% endblock %}
